[daemon]
listen = "127.0.0.1:8080"
log_level = "info"
# log_format = "text"  # "text" (default, human-readable) or "json" (structured, for production)
# shutdown_timeout_secs = 30

[vm]
firecracker_bin = "/usr/local/bin/firecracker"
kernel_path = "/var/lib/agentbox/vmlinux"
rootfs_path = "/var/lib/agentbox/rootfs.ext4"
snapshot_path = "/var/lib/agentbox/snapshot"

[vm.defaults]
memory_mb = 512
vcpus = 1
network = false
timeout_secs = 3600

[pool]
min_size = 2
max_size = 10
idle_timeout_secs = 3600
# number of network-enabled VMs to keep warm (0 = disabled)
network_min_size = 0

[guest]
vsock_port = 5000
ping_timeout_ms = 5000

# Optional TLS — omit or leave empty for plain HTTP
# [tls]
# cert_path = "/etc/agentbox/cert.pem"
# key_path = "/etc/agentbox/key.pem"

# CORS — empty list means same-origin only; ["*"] for permissive (dev only)
# [cors]
# allowed_origins = ["https://your-app.example.com"]

# Rate limiting — 0 = disabled
# [rate_limit]
# requests_per_second = 50
# burst_size = 100
